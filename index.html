<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vivid - Watch Movies & TV Shows</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-left">
            <a href="index.html" class="logo"><img src="logo.jpeg" alt="VIVID" class="logo-img" style="height: 32px; width: auto;"></a>
            <nav class="nav">
                <a href="index.html" class="nav-link active">
                    <svg class="nav-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
                    Home
                </a>
                <a href="browse.html" class="nav-link">Browse</a>
                <a href="search.html" class="nav-link">Search</a>
            </nav>
        </div>
        <div class="header-right">
            <button class="icon-btn search-btn" onclick="window.location.href='search.html'">
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
            </button>
            <button class="icon-btn login-btn">
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/></svg>
            </button>
        </div>
    </header>

    <!-- Hero Carousel -->
    <section class="hero" id="heroCarousel">
        <div class="hero-backdrop" id="heroBackdrop">
            <img src="" alt="Hero Background" class="hero-img" id="heroImg">
            <div class="hero-gradient"></div>
        </div>
        <div class="hero-content" id="heroContent">
            <h1 class="hero-title" id="heroTitle">Loading...</h1>
            <div class="hero-meta" id="heroMeta">
                <span class="rating">--</span>
                <span class="year">----</span>
            </div>
            <p class="hero-desc" id="heroDesc">Fetching the latest movies and shows...</p>
            <div class="hero-buttons">
                <button class="btn btn-play" id="heroPlay">
                    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
                    Play
                </button>
                <button class="btn btn-more">
                    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg>
                    See More
                </button>
            </div>
        </div>
        <div class="hero-nav">
            <button class="hero-nav-btn prev" id="heroPrev">
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
            </button>
            <button class="hero-nav-btn next" id="heroNext">
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
            </button>
        </div>
        <div class="hero-dots" id="heroDots"></div>
    </section>

    <!-- TOP 10 Today -->
    <section class="content-row">
        <h2 class="row-title">TOP 10 Today</h2>
        <div class="row-scroll" id="top10">
            <!-- Populated by JS -->
        </div>
    </section>

    <!-- Trending Today -->
    <section class="content-row">
        <div class="row-header">
            <h2 class="row-title">Trending Today</h2>
            <div class="tabs">
                <button class="tab active">Movies</button>
                <button class="tab">Series</button>
            </div>
        </div>
        <div class="row-scroll" id="trending">
            <!-- Populated by JS -->
        </div>
    </section>

    <!-- Only on Netflix -->
    <section class="content-row">
        <h2 class="row-title">Only on Netflix</h2>
        <div class="row-scroll" id="netflix">
            <!-- Populated by JS -->
        </div>
    </section>

    <!-- Top Rated -->
    <section class="content-row">
        <div class="row-header">
            <h2 class="row-title">Top rated</h2>
            <div class="tabs">
                <button class="tab active">Movies</button>
                <button class="tab">Series</button>
            </div>
        </div>
        <div class="row-scroll" id="toprated">
            <!-- Populated by JS -->
        </div>
    </section>

    <!-- Comedy -->
    <section class="content-row">
        <div class="row-header">
            <div class="row-title-with-select">
                <div class="custom-select">
                    <button class="select-trigger">Comedy</button>
                </div>
            </div>
            <div class="tabs">
                <button class="tab active">Movies</button>
                <button class="tab">Series</button>
            </div>
        </div>
        <div class="row-scroll" id="comedy">
            <!-- Populated by JS -->
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-content">
            <div class="footer-logo"><img src="logo.jpeg" alt="VIVID" class="logo-img" style="height: 32px; width: auto;"></div>
            <p class="footer-text">This site does not store any files on our server, we only linked to the media which is hosted on 3rd party services.</p>
            <a href="mailto:contact@vividmovies.sc" class="footer-link">contact@vividmovies.sc</a>
        </div>
    </footer>

    <!-- Movie Player Modal -->
    <div id="playerModal" class="modal">
        <div class="modal-backdrop"></div>
        <div class="modal-content">
            <button class="modal-close" id="modalClose">
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
            </button>
            <div class="player-wrapper">
                <iframe id="vidkingPlayer" src="" width="100%" height="100%" frameborder="0" allowfullscreen allow="autoplay *; fullscreen *; encrypted-media *; picture-in-picture *; display-capture *; clipboard-read *; clipboard-write *"></iframe>
            </div>
            <div class="movie-details" id="movieDetails">
                <h2 id="detailTitle"></h2>
                <div class="detail-meta" id="detailMeta"></div>
                <p id="detailDesc"></p>
            </div>
            <div class="season-episode-selector" id="seasonEpisodeSelector" style="display:none;">
                <div class="selector-row">
                    <label>Season</label>
                    <select id="seasonSelect"></select>
                </div>
                <div class="selector-row">
                    <label>Episode</label>
                    <select id="episodeSelect"></select>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
